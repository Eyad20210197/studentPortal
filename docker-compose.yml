services:
  mongo:
    image: mongo:7
    container_name: studentportal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: studentportal-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/studentportal
      WHITE_LIST: http://localhost:5173,http://127.0.0.1:5173
      SALT: 10
      TOKEN_ACCESS_USER_SECRET_KEY: local-user-access-secret
      TOKEN_REFRESH_USER_SECRET_KEY: local-user-refresh-secret
      TOKEN_ACCESS_ADMIN_SECRET_KEY: local-admin-access-secret
      TOKEN_REFRESH_ADMIN_SECRET_KEY: local-admin-refresh-secret
      ACCESS_EXPIRES: 1d
      REFRESH_EXPIRES: 7d
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: studentportal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  seed:
    build:
      context: ./backend
    profiles:
      - seed
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/studentportal
      WHITE_LIST: http://localhost:5173,http://127.0.0.1:5173
      SALT: 10
      TOKEN_ACCESS_USER_SECRET_KEY: local-user-access-secret
      TOKEN_REFRESH_USER_SECRET_KEY: local-user-refresh-secret
      TOKEN_ACCESS_ADMIN_SECRET_KEY: local-admin-access-secret
      TOKEN_REFRESH_ADMIN_SECRET_KEY: local-admin-refresh-secret
      ACCESS_EXPIRES: 1d
      REFRESH_EXPIRES: 7d
    command: npm run seed

volumes:
  mongo-data:
